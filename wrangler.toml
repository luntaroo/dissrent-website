#:schema node_modules/wrangler/config-schema.json

name = "dissrent-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages + Next.js via @opennextjs/cloudflare
main = ".open-next/worker.js"

# Serve static assets (CSS, JS, fonts, images)
[assets]
directory = ".open-next/assets"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "dissrent-db"
database_id = "fb750df1-1f1f-4848-8af2-f3c6c9a2543c"

[vars]
APP_BASE_URL = "https://dissrent.com"
RESEND_FROM_EMAIL = "rezervacija@dissrent.com"
ADMIN_EMAIL = "info@dissrent.com"

# Secrets (set via `wrangler secret put`):
# - ADMIN_PASSWORD
# - ADMIN_SESSION_SECRET
# - RESEND_API_KEY
